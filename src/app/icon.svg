<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <!-- Background -->
  <rect width="28" height="28" rx="5" fill="#0D1A28"/>

  <!-- Top face of beam — brass parallelogram -->
  <polygon points="3,7 25,7 28,4 6,4" fill="#C4AE94" opacity="0.18"/>

  <!-- Right face of right column -->
  <polygon points="25,7 28,4 28,22 25,25" fill="#C4AE94" opacity="0.12"/>

  <!-- Main П portal frame — stroke outline -->
  <path
    d="M3 25 L3 7 L25 7 L25 25 L21 25 L21 11 L7 11 L7 25 Z"
    fill="#C4AE94"
    fill-opacity="0.07"
    stroke="#C4AE94"
    stroke-width="1.75"
    stroke-linejoin="miter"
  />

  <!-- Outer depth edges -->
  <line x1="3"  y1="7" x2="6"  y2="4" stroke="#C4AE94" stroke-width="1.5" opacity="0.65"/>
  <line x1="25" y1="7" x2="28" y2="4" stroke="#C4AE94" stroke-width="1.5" opacity="0.65"/>
  <line x1="6"  y1="4" x2="28" y2="4" stroke="#C4AE94" stroke-width="1"   opacity="0.42"/>

  <!-- Inner beam soffit depth -->
  <line x1="7"  y1="11" x2="10" y2="8" stroke="#C4AE94" stroke-width="0.75" opacity="0.30"/>
  <line x1="21" y1="11" x2="24" y2="8" stroke="#C4AE94" stroke-width="0.75" opacity="0.30"/>
  <line x1="10" y1="8"  x2="24" y2="8" stroke="#C4AE94" stroke-width="0.5"  opacity="0.20"/>
</svg>
